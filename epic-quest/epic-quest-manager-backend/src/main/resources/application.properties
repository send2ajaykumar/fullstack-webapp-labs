spring.application.name=epic-quest-manager
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}

# Rate Limiting Configuration
rate.limit.enabled=true
rate.limit.auth.capacity=5
rate.limit.auth.refill-tokens=5
rate.limit.auth.refill-period=1
rate.limit.auth.refill-unit=MINUTES

spring.datasource.url=jdbc:h2:file:./data/epicquestdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=XXXXXXXXXXXXXXS
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=never
